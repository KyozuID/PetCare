<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Form Pemeriksaan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="d-flex flex-column flex-md-row">

        <!-- Sidebar Desktop -->
        <div class="sidebar p-4 d-none d-md-block">
            <h3 class="text-white text-center mb-4 d-flex align-items-center justify-content-center gap-2">
                <img src="assets/img/logo.png" alt="Logo PetCare" width="35">
                <span class="fw-bold">PetCare</span>
            </h3>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <i class="bi bi-house-door me-3"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="form.html" class="nav-link">
                        <i class="bi bi-plus-circle me-3"></i> Tambah Hewan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="pemeriksaan.html" class="nav-link active">
                        <i class="bi bi-heart-pulse me-3"></i> Pemeriksaan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="tabel.html" class="nav-link">
                        <i class="bi bi-table me-3"></i> Data Hewan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="riwayat_pemeriksaan.html" class="nav-link">
                        <i class="bi bi-clock-history me-3"></i> Riwayat Pemeriksaan
                    </a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link">
                        <i class="bi bi-info-circle me-3"></i> About
                    </a>
                </li>
            </ul>
        </div>

        <!-- Mobile Sidebar (Offcanvas) -->
        <div class="offcanvas offcanvas-start text-white p-3" tabindex="-1" id="mobileSidebar">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title d-flex align-items-center gap-2 fw-bold">
                    <img src="assets/img/logo.png" width="30" alt="Logo">
                    PetCare
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body px-0">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <i class="bi bi-house-door me-3"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="form.html" class="nav-link">
                            <i class="bi bi-plus-circle me-3"></i> Tambah Hewan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="pemeriksaan.html" class="nav-link active">
                            <i class="bi bi-heart-pulse me-3"></i> Pemeriksaan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="tabel.html" class="nav-link">
                            <i class="bi bi-table me-3"></i> Data Hewan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="riwayat_pemeriksaan.html" class="nav-link">
                            <i class="bi bi-clock-history me-3"></i> Riwayat Pemeriksaan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="about.html" class="nav-link">
                            <i class="bi bi-info-circle me-3"></i> About
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column min-vh-100">

            <!-- Navbar -->
            <nav class="navbar top-navbar px-4 py-3">

                <div class="d-flex align-items-center">

                    <!-- Burger Button -->
                    <button class="btn btn-primary d-md-none me-3" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#mobileSidebar">

                        <i class="bi bi-list"></i>

                    </button>

                    <h4 class="fw-bold mb-0">
                        Pemeriksaan
                    </h4>

                </div>

                <div>
                    <button class="btn btn-primary">
                        <i class="bi bi-person-circle me-1"></i>
                        Admin
                    </button>
                </div>

            </nav>

            <!-- Content -->
            <div class="container-fluid p-4">

                <div class="card custom-card p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div>
                            <h4 class="fw-bold mb-1">
                                Form Pemeriksaan
                            </h4>
                        </div>

                    </div>

                    <form>

                        <div class="row">

                            <!-- Nama Hewan -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Nama Hewan
                                </label>

                                <select class="form-select">

                                    <option selected disabled>
                                        Pilih hewan
                                    </option>

                                    <option>Milo</option>
                                    <option>Bruno</option>
                                    <option>Kitty</option>

                                </select>
                            </div>

                            <!-- Nama Pemilik -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Nama Pemilik
                                </label>

                                <input type="text" class="form-control" placeholder="Masukkan nama pemilik">
                            </div>

                            <!-- Tanggal Pemeriksaan -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Tanggal Pemeriksaan
                                </label>

                                <input type="date" class="form-control">
                            </div>

                            <!-- Keluhan -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Keluhan
                                </label>

                                <input type="text" class="form-control" placeholder="Masukkan keluhan">
                            </div>

                            <!-- Diagnosa -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Diagnosa
                                </label>

                                <textarea class="form-control" rows="4"
                                    placeholder="Masukkan hasil diagnosa"></textarea>
                            </div>

                            <!-- Tindakan -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Tindakan / Pengobatan
                                </label>

                                <textarea class="form-control" rows="4" placeholder="Masukkan tindakan"></textarea>
                            </div>

                            <!-- Status Vaksin -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Vaksin Hari Ini?
                                </label>

                                <select class="form-select">

                                    <option selected disabled>
                                        Pilih status vaksin
                                    </option>

                                    <option>Ya</option>
                                    <option>Tidak</option>

                                </select>
                            </div>

                            <!-- Jenis Vaksin -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Jenis Vaksin
                                </label>

                                <select class="form-select">

                                    <option selected disabled>
                                        Pilih jenis vaksin
                                    </option>

                                    <option>Rabies</option>
                                    <option>Parvo</option>
                                    <option>Distemper</option>

                                </select>
                            </div>

                            <!-- Tanggal Vaksin -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Tanggal Vaksin
                                </label>

                                <input type="date" class="form-control">
                            </div>

                            <!-- Expired Vaksin -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Expired Vaksin
                                </label>

                                <input type="date" class="form-control">
                            </div>

                        </div>

                        <!-- Button -->
                        <div class="d-flex gap-2 mt-3">

                            <button type="submit" class="btn btn-primary btn-custom">

                                <i class="bi bi-save me-1"></i>
                                Simpan Pemeriksaan
                            </button>

                            <button type="reset" class="btn btn-secondary btn-custom">

                                Reset
                            </button>

                        </div>

                    </form>

                </div>

            </div>

            <!-- Footer -->
            <footer class="text-center py-3">

                <p class="mb-0 text-muted">
                    © 2026 PetCare
                </p>

            </footer>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
